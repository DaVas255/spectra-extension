<!DOCTYPE html>
<html lang='ru'>

<head>
  <meta charset='UTF-8'>
  <meta name='viewport' content='width=device-width, initial-scale=1.0'>
  <title>Spectra - Monitoring</title>
  <style>
    body {
      width: 300px;
      height: 200px;
      margin: 0;
      padding: 15px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f5f5f5;
      color: #333;
    }

    .header {
      text-align: center;
      margin-bottom: 15px;
    }

    .header h1 {
      font-size: 16px;
      margin: 0;
      color: #1890ff;
    }

    .status {
      text-align: center;
      font-size: 14px;
      margin-bottom: 15px;
      padding: 8px;
      background: white;
      border-radius: 4px;
      border: 1px solid #d9d9d9;
    }

    .controls {
      text-align: center;
    }

    button {
      background: #1890ff;
      color: white;
      border: none;
      padding: 8px 16px;
      border-radius: 4px;
      cursor: pointer;
      font-size: 12px;
    }

    button:hover {
      background: #40a9ff;
    }

    .version {
      text-align: center;
      font-size: 10px;
      color: #999;
      margin-top: 10px;
    }
  </style>
</head>

<body>
  <div class='header'>
    <h1>Spectra</h1>
  </div>

  <div class='status' id='status'>
    Loading...
  </div>

  <div class='controls'>
    <button id='toggle-button'>Toggle Monitoring</button>
  </div>

  <div class='version' id='version'></div>

  <script src='popup.js'></script>
</body>

</html>
