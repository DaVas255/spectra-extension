<!DOCTYPE html>
<html lang='ru'>

<head>
  <meta charset='UTF-8'>
  <meta name='viewport' content='width=device-width, initial-scale=1.0'>
  <title>Spectra - Monitoring</title>
  <style>
    body {
      width: 320px;
      min-height: 280px;
      margin: 0;
      padding: 16px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #fafafa;
      color: #333;
    }

    .header {
      text-align: center;
      margin-bottom: 16px;
    }

    .header h1 {
      font-size: 18px;
      margin: 0;
      color: #1890ff;
    }

    .status {
      text-align: center;
      font-size: 13px;
      margin-bottom: 12px;
      padding: 8px;
      background: white;
      border-radius: 6px;
      border: 1px solid #d9d9d9;
    }

    .status-active {
      background: #f6ffed;
      border-color: #b7eb8f;
      color: #52c41a;
    }

    .status-inactive {
      background: #fff2f0;
      border-color: #ffccc7;
      color: #ff4d4f;
    }

    .form-group {
      margin-bottom: 12px;
    }

    .form-group label {
      display: block;
      font-size: 12px;
      color: #666;
      margin-bottom: 4px;
    }

    .form-group input {
      width: 100%;
      padding: 8px 10px;
      font-size: 12px;
      border: 1px solid #d9d9d9;
      border-radius: 4px;
      box-sizing: border-box;
    }

    .form-group input:focus {
      outline: none;
      border-color: #1890ff;
      box-shadow: 0 0 0 2px rgba(24, 144, 255, 0.1);
    }

    .form-group input:disabled {
      background: #f5f5f5;
      color: #999;
    }

    .controls {
      display: flex;
      gap: 8px;
      margin-bottom: 12px;
    }

    button {
      flex: 1;
      background: #1890ff;
      color: white;
      border: none;
      padding: 8px 12px;
      border-radius: 4px;
      cursor: pointer;
      font-size: 12px;
    }

    button:hover {
      background: #40a9ff;
    }

    button.secondary {
      background: #fff;
      color: #666;
      border: 1px solid #d9d9d9;
    }

    button.secondary:hover {
      background: #f5f5f5;
    }

    .info {
      font-size: 11px;
      color: #999;
      text-align: center;
      margin-bottom: 8px;
    }

    .info span {
      display: block;
      margin-bottom: 2px;
    }

    .version {
      text-align: center;
      font-size: 10px;
      color: #bbb;
      margin-top: 12px;
    }
  </style>
</head>

<body>
  <div class='header'>
    <h1>Spectra</h1>
  </div>

  <div class='status' id='status'>
    Загрузка...
  </div>

  <div class='form-group'>
    <label for='api-key'>API Key</label>
    <input type='text' id='api-key' placeholder='sk_live_xxx...' />
  </div>

  <div class='controls'>
    <button id='save-button'>Сохранить</button>
    <button id='clear-button' class='secondary'>Очистить</button>
  </div>

  <div class='info'>
    <span id='sites-count'>Сайтов: 0</span>
    <span id='last-sync'>Синхронизация: --:--:--</span>
    <span id='buffer-size'>В буфере: 0</span>
  </div>

  <div class='version' id='version'></div>

  <script src='popup.js'></script>
</body>

</html>
